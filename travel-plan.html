<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>DreamTrip - Your Travel Plan</title>

    <style>
        * {

        }
        
        body {

        }

        .travel-plan-container {

        .trip-overview {

        }

            color: white;

            z-index: 1001;

            opacity: 1;

        .saved-plan-content {
            padding: 15px;
        }
        
        .saved-plan-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1b3da0;

        }
        
        .saved-plan-details {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }
        
        .saved-plan-actions {
            display: flex;

        }
        
        .saved-plan-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;

        .view-plan-btn {
            background-color: #1b3da0;

        }
        
        .view-plan-btn:hover {
            background-color: #0f2963;
        }
        
        .delete-plan-btn {

            color: white;

        .delete-plan-btn:hover {

        }
        
        .no-plans-message {

        /* Dark Mode */
        body.dark {

        }
        
        body.dark .plan-map-container, 
        body.dark .plan-budget-container,

        body.dark .saved-plans-container {

        body.dark .day-title {

        body.dark .budget-table th {

        }

        }

        }
        
        body.dark .activity {

        }
        
        body.dark .activity-icon {

            color: #4facfe;
        }
        
        body.dark .map-highlight {
            background-color: #333;
        }
        
        body.dark .map-highlight i {
            color: #4facfe;
        }
        
        body.dark .recommendation-list li {

        }
        
        body.dark .recommendation-list li i {

        body.dark .back-btn {

        body.dark .back-btn:hover {

        }
        
        body.dark .saved-plan-card {
            background-color: #333;
        }
        
        body.dark .saved-plan-title {

            color: #ccc;
        }
        
        /* Responsive */
        @media (max-width: 992px) {
            .plan-content {
                grid-template-columns: 1fr;
            }
            
            .day-content {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>

    <script>
    
    
    // Theme toggle
const themeBtn = document.getElementById("themeToggle");
if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark");
    themeBtn.classList.replace("fa-sun", "fa-moon");
}
themeBtn.addEventListener('click',()=>{
    document.body.classList.toggle("dark");
    if(document.body.classList.contains("dark")){
        themeBtn.classList.replace("fa-sun", "fa-moon");
        localStorage.setItem("theme","dark");
    }
    else{
        themeBtn.classList.replace("fa-moon", "fa-sun");
        localStorage.setItem("theme","light");
    }
});

// Global variable to store current travel plan data
let currentTravelPlanData = null;
// Global variable to hold the map instance for proper removal
let mapInstance = null;

// Initialize the page
 $(document).ready(function() {
    // Load saved plans
    loadSavedPlans();
    
    // Check if we're viewing a saved plan
    const viewingPlan = sessionStorage.getItem('viewingPlan');
    if (viewingPlan) {
        const travelPlanData = JSON.parse(viewingPlan);
        sessionStorage.removeItem('viewingPlan');
        currentTravelPlanData = travelPlanData;
        renderTravelPlan(travelPlanData);
    } else {
        // Get form data from sessionStorage
        const formData = {
            destination: sessionStorage.getItem('destination') || 'Kerala',
            duration: sessionStorage.getItem('duration') || '10',
            travelers: sessionStorage.getItem('travelers') || '2',
            season: sessionStorage.getItem('season') || 'winter',
            interests: sessionStorage.getItem('interests') ? sessionStorage.getItem('interests').split(',') : ['Nature', 'Backwaters', 'Beaches'],
            budget: sessionStorage.getItem('budget') || '25000'
        };
        
        // Show loading overlay
        $("#loadingOverlay").removeClass("hidden");
        
        // Fetch travel plan from API
        fetchTravelPlanFromAPI(formData);
    }
    
    // Event handlers
    $("#savePlanBtn").click(function() {
        saveTravelPlan();
    });
    
    $("#sharePlanBtn").click(function() {
        shareTravelPlan();
    });
    
    $("#backToFormBtn").click(function() {
        window.location.href = "index1.html";
    });
});

function loadSavedPlans() {
    // Get saved plans from localStorage
    const savedPlans = JSON.parse(localStorage.getItem('dreamTripPlans') || '[]');
    const savedPlansGrid = $("#savedPlansGrid");
    
    if (savedPlans.length === 0) {
        savedPlansGrid.html('<div class="no-plans-message">You haven\'t saved any travel plans yet. Create your first plan now!</div>');
        return;
    }
    
    savedPlansGrid.empty();
    
    savedPlans.forEach(function(plan) {
        const planCard = `
            <div class="saved-plan-card">
                <div class="saved-plan-image">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <div class="saved-plan-content">
                    <div class="saved-plan-title">${plan.tripName}</div>
                    <div class="saved-plan-details">
                        <div><i class="fas fa-calendar"></i> ${plan.duration}</div>
                        <div><i class="fas fa-users"></i> ${plan.travelers}</div>
                        <div><i class="fas fa-money-bill-wave"></i> ${plan.budget ? "₹" + plan.budget.total.toLocaleString() : "Budget not specified"}</div>
                    </div>
                    <div class="saved-plan-actions">
                        <button class="saved-plan-btn view-plan-btn" data-plan-id="${plan.id}">
                            <i class="fas fa-eye"></i> View
                        </button>
                        <button class="saved-plan-btn delete-plan-btn" data-plan-id="${plan.id}">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            </div>
        `;
        savedPlansGrid.append(planCard);
    });
    
    // Add event handlers for view and delete buttons
    $(".view-plan-btn").click(function() {
        const planId = $(this).data('plan-id');
        viewSavedPlan(planId);
    });
    
    $(".delete-plan-btn").click(function() {
        const planId = $(this).data('plan-id');
        deleteSavedPlan(planId);
    });
}

function viewSavedPlan(planId) {
    // Get saved plans from localStorage
    const savedPlans = JSON.parse(localStorage.getItem('dreamTripPlans') || '[]');
    
    // Find the plan with the matching ID
    const plan = savedPlans.find(p => p.id == planId);
    
    if (plan) {
        // Set the current travel plan data
        currentTravelPlanData = plan;
        
        // Render the travel plan
        renderTravelPlan(plan);
        
        // Scroll to top
        window.scrollTo(0, 0);
    } else {
        showToast("Plan not found!");
    }
}

function deleteSavedPlan(planId) {
    if (confirm("Are you sure you want to delete this travel plan?")) {
        // Get saved plans from localStorage
        let savedPlans = JSON.parse(localStorage.getItem('dreamTripPlans') || '[]');
        
        // Remove the plan with the matching ID
        savedPlans = savedPlans.filter(p => p.id != planId);
        
        // Save the updated plans array
        localStorage.setItem('dreamTripPlans', JSON.stringify(savedPlans));
        
        // If we're currently viewing the deleted plan, reset the current data
        if (currentTravelPlanData && currentTravelPlanData.id == planId) {
            currentTravelPlanData = null;
            // Clear the current plan display
            $("#tripName").text("Your Travel Plan");
            $("#tripDuration").text("Loading...");
            $("#tripTravelers").text("Loading...");
            $("#tripBudget").text("Loading...");
            $("#tripInterests").text("Loading...");
            $("#tripOrigin").text("Loading...");
            $("#mapHighlights").empty();
            $("#itineraryDays").empty();
            $("#recommendationList").empty();
        }
        
        // Reload the saved plans
        loadSavedPlans();
        
        showToast("Travel plan deleted successfully!");
    }
}

function renderTravelPlan(travelPlanData) {
    try {
        // Store the current travel plan data globally
        currentTravelPlanData = travelPlanData;
        
        // Update trip overview
        $("#tripName").text(travelPlanData.tripName || "Travel Plan");
        $("#tripDuration").text(travelPlanData.duration || "Not specified");
        $("#tripTravelers").text((travelPlanData.travelers || "Not specified"));
        
        // Handle budget display with proper error checking
        if (travelPlanData.budget && travelPlanData.budget.total) {
            const totalBudget = typeof travelPlanData.budget.total === 'string' 
                ? parseInt(travelPlanData.budget.total.replace(/[^\d]/g, '')) 
                : travelPlanData.budget.total;
            $("#tripBudget").text("₹" + (totalBudget || 0).toLocaleString() + " total");
        } else {
            $("#tripBudget").text("Budget not specified");
        }
        
        $("#tripInterests").text((travelPlanData.interests || []).join(", "));
        $("#tripOrigin").text(travelPlanData.origin || "Not specified");
        
        // Update map highlights
        const mapHighlights = $("#mapHighlights");
        mapHighlights.empty();
        
        if (travelPlanData.mapHighlights && Array.isArray(travelPlanData.mapHighlights)) {
            travelPlanData.mapHighlights.forEach(function(highlight, index) {
                mapHighlights.append(`
                    <div class="map-highlight">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${index + 1}. ${highlight}</span>
                    </div>
                `);
            });
        } else {
            mapHighlights.append('<div class="map-highlight"><i class="fas fa-map-marker-alt"></i><span>No map highlights available</span></div>');
        }
        
        // Initialize map with error handling
        try {
            // Pass the full travelPlanData object to the map function
            initializeMap(travelPlanData.mapHighlights || [], travelPlanData);
        } catch (error) {
            console.error("Error initializing map:", error);
            $("#plan-map").html('<div style="display: flex; justify-content: center; align-items: center; height: 100%; color: #666;">Map unavailable</div>');
        }
        
        // Initialize budget chart with error handling
        try {
            if (travelPlanData.budget) {
                initializeBudgetChart(travelPlanData.budget);
                updateBudgetTable(travelPlanData.budget);
            } else {
                $("#budgetChart").parent().html('<div style="display: flex; justify-content: center; align-items: center; height: 100%; color: #666;">Budget chart unavailable</div>');
                $("#budgetTable").html('<tr><td colspan="2">Budget information not available</td></tr>');
            }
        } catch (error) {
            console.error("Error initializing budget chart:", error);
            $("#budgetChart").parent().html('<div style="display: flex; justify-content: center; align-items: center; height: 100%; color: #666;">Budget chart unavailable</div>');
            $("#budgetTable").html('<tr><td colspan="2">Budget information not available</td></tr>');
        }
        
        // Initialize itinerary with error handling
        try {
            if (travelPlanData.itinerary && Array.isArray(travelPlanData.itinerary)) {
                initializeItinerary(travelPlanData.itinerary);
            } else {
                $("#itineraryDays").html('<div style="text-align: center; padding: 30px; color: #666;">Itinerary information not available</div>');
            }
        } catch (error) {
            console.error("Error initializing itinerary:", error);
            $("#itineraryDays").html('<div style="text-align: center; padding: 30px; color: #666;">Itinerary information not available</div>');
        }
        
        // Update recommendations with error handling
        try {
            const recommendationList = $("#recommendationList");
            recommendationList.empty();
            
            if (travelPlanData.recommendations && Array.isArray(travelPlanData.recommendations)) {
                travelPlanData.recommendations.forEach(function(recommendation) {
                    recommendationList.append(`
                        <li>
                            <i class="fas fa-check-circle"></i>
                            <span>${recommendation}</span>
                        </li>
                    `);
                });
            } else {
                recommendationList.append('<li><i class="fas fa-info-circle"></i><span>No recommendations available</span></li>');
            }
        } catch (error) {
            console.error("Error updating recommendations:", error);
            $("#recommendationList").html('<li><i class="fas fa-info-circle"></i><span>Recommendations not available</span></li>');
        }
    } catch (error) {
        console.error("Error rendering travel plan:", error);
        showToast("Error displaying travel plan. Please try again.");
    }
}

function updateBudgetTable(budgetData) {
    const budgetTable = $("#budgetTable");
    budgetTable.empty();
    
    if (!budgetData || !budgetData.breakdown) {
        budgetTable.html('<tr><td colspan="2">Budget breakdown not available</td></tr>');
        return;
    }
    
    const breakdown = budgetData.breakdown;
    budgetTable.append(`
        <tr>
            <th>Accommodation</th>
            <td>₹${(breakdown.accommodation || 0).toLocaleString()}</td>
        </tr>
        <tr>
            <th>Food & Cuisine</th>
            <td>₹${(breakdown.food || 0).toLocaleString()}</td>
        </tr>
        <tr>
            <th>Transport</th>
            <td>₹${(breakdown.transport || 0).toLocaleString()}</td>
        </tr>
        <tr>
            <th>Activities</th>
            <td>₹${(breakdown.activities || 0).toLocaleString()}</td>
        </tr>
        <tr>
            <th>Miscellaneous</th>
            <td>₹${(breakdown.miscellaneous || 0).toLocaleString()}</td>
        </tr>
        <tr>
            <th>Total Budget</th>
            <td>₹${(budgetData.total || 0).toLocaleString()}</td>
        </tr>
    `);
}

        const parts = tripName.split(' ');

// UPDATED: This function now destroys any previous chart instance
function initializeBudgetChart(budgetData) {
    // Check if Chart is available
    if (typeof Chart === 'undefined') {
        console.error("Chart.js library not loaded");
        return;
    }
    
    const ctx = document.getElementById('budgetChart').getContext('2d');
    
    // IMPORTANT: Destroy any existing chart instance to prevent errors
    if (window.budgetChartInstance) {
        window.budgetChartInstance.destroy();
    }
    
    // Ensure we have valid data
    if (!budgetData || !budgetData.breakdown) {
        console.error("Invalid budget data");
        return;
    }
    
    // Create a new chart and store it in the window object
    window.budgetChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Accommodation', 'Food & Cuisine', 'Transport', 'Activities', 'Miscellaneous'],
            datasets: [{
                data: [
                    budgetData.breakdown.accommodation || 0,
                    budgetData.breakdown.food || 0,
                    budgetData.breakdown.transport || 0,
                    budgetData.breakdown.activities || 0,
                    budgetData.breakdown.miscellaneous || 0
                ],
                backgroundColor: ['#4facfe', '#00f2fe', '#1b3da0', '#3a8fe6', '#7cb9e8'],
                borderColor: '#ffffff',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { font: { family: 'Roboto', size: 12 }, padding: 15 }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const label = context.label || '';
                            const value = context.raw || 0;
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const percentage = total > 0 ? Math.round((value / total) * 100) : 0;
                            return `${label}: ₹${value.toLocaleString()} (${percentage}%)`;
                        }
                    }
                }
            }
        }
    });
}

function initializeItinerary(itineraryData) {
    const itineraryDays = $("#itineraryDays");
    itineraryDays.empty();
    
    if (!itineraryData || !Array.isArray(itineraryData)) {
        itineraryDays.html('<div style="text-align: center; padding: 30px; color: #666;">Itinerary data not available</div>');
        return;
    }
    
    itineraryData.forEach(function(day) {
        // Create activities HTML
        const activitiesHtml = (day.activities || []).map(function(activity) {
            return `
                <div class="activity">
                    <div class="activity-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="activity-details">
                        <p>${activity}</p>
                    </div>
                </div>
            `;
        }).join('');
        
        // Create media element with fallback images
        let mediaElement = '';
        if (day.image && day.image.startsWith('http')) {
            mediaElement = `<img src="${day.image}" alt="${day.title || 'Day ' + day.day}" onerror="this.src='https://picsum.photos/seed/${day.day || 'default'}/600/400.jpg'">`;
        } else if (day.video && day.video.startsWith('http')) {
            mediaElement = `
                <video controls>
                    <source src="${day.video}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            `;
        } else {
            // Use a placeholder image if no valid image or video is provided
            mediaElement = `<img src="https://picsum.photos/seed/${day.day || 'default'}/600/400.jpg" alt="${day.title || 'Day ' + day.day}">`;
        }
        
        const dayHtml = `
            <div class="day-plan">
                <div class="day-header">
                    <div class="day-number">${day.day || '?'}</div>
                    <div class="day-title">${day.title || 'Day ' + (day.day || '?')}</div>
                </div>
                <div class="day-content">
                    <div class="day-description">
                        <div class="day-activities">
                            ${activitiesHtml || '<p>No activities specified for this day</p>'}
                        </div>
                    </div>
                    <div class="day-media">
                        ${mediaElement}
                    </div>
                </div>
            </div>
        `;
        
        itineraryDays.append(dayHtml);
    });
}

function fetchTravelPlanFromAPI(formData) {
    const prompt = `Generate a detailed travel plan for ${formData.destination} for ${formData.duration} days for ${formData.travelers} travelers in ${formData.season} season with interests in ${formData.interests.join(', ')}. The budget is ₹${formData.budget} per person. Provide the response in the following format:

    Trip Name: [Name of the trip]
    Duration: [Number of days]
    Dates: [Start date to end date]
    Travelers: [Number]
    Budget:
      Total: [Total budget for all travelers]
      Per Person: [Budget per person]
      Breakdown:
        Accommodation: [Amount]
        Food & Cuisine: [Amount]
        Transport: [Amount]
        Activities: [Amount]
        Miscellaneous: [Amount]
    Interests: [List of interests]
    Origin: [Starting point]
    
    Map Route Highlights:
    1. [Route point 1]
    2. [Route point 2]
    ...
    
    Daywise Travel Plan:
    
    Day 1 – [Day title]
    * [Activity 1]
    * [Activity 2]
    * [Activity 3]
    * [Activity 4]
    Image: [A relevant, high-quality image URL]
    
    Day 2 – [Day title]
    * [Activity 1]
    * [Activity 2]
    * [Activity 3]
    * [Activity 4]
    Image: [A relevant, high-quality image URL]
    Video: [A relevant video URL for a travel platform]
    
    ... (continue for all days)
    
    Recommendations:
    * [Recommendation 1]
    * [Recommendation 2]
    * [Recommendation 3]
    * [Recommendation 4]
    
    For Ladakh destinations, include specific attractions like Khardung La Pass, Pangong Lake, Nubra Valley, Turtuk Village, Lamayuru Monastery, Tsomoriri Lake, and other key landmarks. Provide realistic budget breakdown for accommodation in homestays, local food, shared taxis, and permits.`;
    
    const settings = {
        async: true,
        crossDomain: true,
        url: 'https://copilot5.p.rapidapi.com/copilot',
        method: 'POST',
        headers: {
            'x-rapidapi-key': '199a18d751msh4d04f63115b2af0p1e1c14jsn69cf6673e7e6',
            'x-rapidapi-host': 'copilot5.p.rapidapi.com',
            'Content-Type': 'application/json'
        },
        data: JSON.stringify({ message: prompt }),
        timeout: 30000
    };

    $.ajax(settings).done(function(response) {
        try {
            let responseText = "";
            if (response && response.a) {
                responseText = response.a;
            } else if (typeof response === 'string') {
                responseText = response;
            } else {
                responseText = JSON.stringify(response);
            }
            
            if (!responseText || responseText.length < 100) {
                throw new Error("Invalid response from API");
            }
            
            const travelPlanData = parseTravelPlanResponse(responseText);
            
            if (!travelPlanData.tripName || !travelPlanData.itinerary || travelPlanData.itinerary.length === 0) {
                throw new Error("Invalid travel plan data parsed");
            }
            
            document.getElementById('loadingOverlay').classList.add('hidden');
            renderTravelPlan(travelPlanData);
        } catch (error) {
            console.error('Error parsing API response:', error);
            document.getElementById('loadingOverlay').classList.add('hidden');
            useFallbackData(formData);
        }
    }).fail(function(error) {
        console.error('API call failed:', error);
        document.getElementById('loadingOverlay').classList.add('hidden');
        useFallbackData(formData);
    });
}

            dates: "Flexible",
            travelers: formData.travelers,

function parseTravelPlanResponse(responseText) {
    const lines = responseText.split('\n');
    function toNumber(val) { 
        if (!val) return 0; 
        const num = parseInt(val.replace(/[^\d]/g, '')); 
        return isNaN(num) ? 0 : num; 
    }
    
    const travelPlanData = { 
        tripName: "", 
        duration: "", 
        dates: "", 
        travelers: "", 
        budget: { 
            total: 0, 
            perPerson: 0, 
            breakdown: { 
                accommodation: 0, 
                food: 0, 
                transport: 0, 
                activities: 0, 
                miscellaneous: 0 
            } 
        }, 
        interests: [], 
        origin: "", 
        mapHighlights: [], 
        itinerary: [], 
        recommendations: [] 
    };
    
    let currentSection = ""; 
    let currentDay = null;
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        
        if (line.startsWith("Trip Name:")) { 
            travelPlanData.tripName = line.substring("Trip Name:".length).trim(); 
        } else if (line.startsWith("Duration:")) { 
            travelPlanData.duration = line.substring("Duration:".length).trim(); 
        } else if (line.startsWith("Dates:")) { 
            travelPlanData.dates = line.substring("Dates:".length).trim(); 
        } else if (line.startsWith("Travelers:")) { 
            travelPlanData.travelers = line.substring("Travelers:".length).trim(); 
        } else if (line.startsWith("Total:")) { 
            travelPlanData.budget.total = toNumber(line.substring("Total:".length)); 
        } else if (line.startsWith("Per Person:")) { 
            travelPlanData.budget.perPerson = toNumber(line.substring("Per Person:".length)); 
        } else if (line.startsWith("Accommodation:")) { 
            travelPlanData.budget.breakdown.accommodation = toNumber(line.substring("Accommodation:".length)); 
        } else if (line.startsWith("Food & Cuisine:")) { 
            travelPlanData.budget.breakdown.food = toNumber(line.substring("Food & Cuisine:".length)); 
        } else if (line.startsWith("Transport:")) { 
            travelPlanData.budget.breakdown.transport = toNumber(line.substring("Transport:".length)); 
        } else if (line.startsWith("Activities:")) { 
            travelPlanData.budget.breakdown.activities = toNumber(line.substring("Activities:".length)); 
        } else if (line.startsWith("Miscellaneous:")) { 
            travelPlanData.budget.breakdown.miscellaneous = toNumber(line.substring("Miscellaneous:".length)); 
        } else if (line.startsWith("Interests:")) { 
            let raw = line.substring("Interests:".length).trim(); 
            if (!raw || raw === "-" || raw.toLowerCase() === "none") { 
                travelPlanData.interests = []; 
            } else { 
                travelPlanData.interests = raw.split(',').map(i => i.trim()); 
            } 
        } else if (line.startsWith("Origin:")) { 
            travelPlanData.origin = line.substring("Origin:".length).trim(); 
        } else if (line === "Map Route Highlights:") { 
            currentSection = "mapHighlights"; 
        } else if (line === "Daywise Travel Plan:") { 
            currentSection = "itinerary"; 
        } else if (line === "Recommendations:") { 
            currentSection = "recommendations"; 
        } else if (line.startsWith("Day ") && (line.includes("–") || line.includes("-"))) { 
            const dayMatch = line.match(/Day\s+(\d+)\s*[–-]\s*(.+)/); 
            if (dayMatch) { 
                currentDay = { 
                    day: parseInt(dayMatch[1]), 
                    title: dayMatch[2], 
                    activities: [] 
                }; 
                travelPlanData.itinerary.push(currentDay); 
            } 
        } else if (line.startsWith("* ")) { 
            const activity = line.substring(2).trim(); 
            if (currentSection === "mapHighlights") { 
                travelPlanData.mapHighlights.push(activity); 
            } else if (currentSection === "itinerary" && currentDay) { 
                currentDay.activities.push(activity); 
            } else if (currentSection === "recommendations") { 
                travelPlanData.recommendations.push(activity); 
            } 
        } else if (line.startsWith("Image:")) { 
            if (currentDay) { 
                currentDay.image = line.substring("Image:".length).trim(); 
            } 
        } else if (line.startsWith("Video:")) { 
            if (currentDay) { 
                currentDay.video = line.substring("Video:".length).trim(); 
            } 
        }
    }
    
    return travelPlanData;
}

function saveTravelPlan() {
    try {
        // Check if we have current travel plan data
        if (!currentTravelPlanData) {
            showToast("No travel plan data available to save");
            return;
        }
        
        // Create a new plan object with a new id and timestamp
        const planToSave = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            ...currentTravelPlanData
        };
        
        // Get existing plans from localStorage
        let savedPlans = JSON.parse(localStorage.getItem('dreamTripPlans') || '[]');
        
        // Add the current plan
        savedPlans.push(planToSave);
        
        // Save to localStorage
        localStorage.setItem('dreamTripPlans', JSON.stringify(savedPlans));
        
        // Reload the saved plans
        loadSavedPlans();
        
        // Show a success message
        showToast("Your travel plan has been saved successfully!");
    } catch (error) {
        console.error("Error saving travel plan:", error);
        showToast("Error saving travel plan. Please try again.");
    }
}

function shareTravelPlan() {
    try {
        // Create shareable text
        const shareText = `Check out my trip to ${$("#tripName").text()}!`;
        
        // Use the Web Share API if available
        if (navigator.share) {
            navigator.share({
                title: 'My Dream Trip',
                text: shareText,
                url: window.location.href
            }).then(() => {
                showToast("Thanks for sharing your travel plan!");
            }).catch((error) => {
                console.log('Error sharing:', error);
                copyToClipboard(shareText);
            });
        } else {
            // Fallback to copying to clipboard
            copyToClipboard(shareText);
        }
    } catch (error) {
        console.error("Error sharing travel plan:", error);
        showToast("Error sharing travel plan. Please try again.");
    }
}

function copyToClipboard(text) {
    try {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        
        showToast("Link copied to clipboard!");
    } catch (error) {
        console.error("Error copying to clipboard:", error);
        showToast("Error copying to clipboard. Please try again.");
    }
}

function showToast(message) {
    try {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        // Show the toast
        setTimeout(() => {
            toast.classList.add('show');
        }, 100);
        
        // Hide the toast after 3 seconds
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 300);
        }, 3000);
    } catch (error) {
        console.error("Error showing toast notification:", error);
        alert(message); // Fallback to alert
    }
}
