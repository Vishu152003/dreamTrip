<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Trip Form</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .form-section {
      width: 80%;
      max-width: 700px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      padding: 30px;
      transform: rotateY(30deg) scale(0.8);
      transform-origin: right center;
      opacity: 0;
      transition: all 0.8s ease;
    }

    .form-section.show {
      transform: rotateY(0deg) scale(1);
      opacity: 1;
    }

    .section-title {
      font-size: 24px;
      text-align: center;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 8px;
      color: #444;
      font-weight: 500;
    }

    input, select {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: #5563DE;
      box-shadow: 0 0 6px rgba(85, 99, 222, 0.3);
    }

    .interests-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .interest-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .budget-container {
      margin-top: 20px;
    }

    .budget-slider {
      width: 100%;
    }

    .budget-display {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      color: #444;
    }

    .generate-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      background: linear-gradient(135deg, #5563DE, #74ABE2);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .generate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    @media (max-width: 600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Toggle Button -->
  <div class="menu-toggle" id="menuToggle">
    <i class="fas fa-bars"></i>
    <i class="fas fa-times"></i>
  </div>

  <!-- Travel Form Section -->
  <div class="form-section" id="formSection">
    <h2 class="section-title">
      <i class="fas fa-map-marked-alt"></i>
      Create Your Dream India Travel Plan
    </h2>

    <form id="travelForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="destination">Destination</label>
          <select id="destination" required>
            <option value="">Select a destination</option>
            <option value="agra">Agra, Uttar Pradesh</option>
            <option value="jaipur">Jaipur, Rajasthan</option>
            <option value="goa">Goa</option>
            <option value="kerala">Kerala</option>
            <option value="varanasi">Varanasi, Uttar Pradesh</option>
            <option value="mumbai">Mumbai, Maharashtra</option>
            <option value="delhi">Delhi</option>
            <option value="darjeeling">Darjeeling, West Bengal</option>
            <option value="ladakh">Ladakh</option>
            <option value="rajasthan">Rajasthan</option>
          </select>
        </div>

        <div class="form-group">
          <label for="duration">Duration (days)</label>
          <input type="number" id="duration" min="1" max="30" value="7" required>
        </div>

        <div class="form-group">
          <label for="travelers">Number of Travelers</label>
          <input type="number" id="travelers" min="1" max="10" value="2" required>
        </div>

        <div class="form-group">
          <label for="season">Season</label>
          <select id="season" required>
            <option value="">Select a season</option>
            <option value="winter">Winter (Oct-Feb)</option>
            <option value="summer">Summer (Mar-Jun)</option>
            <option value="monsoon">Monsoon (Jul-Sep)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Travel Interests</label>
        <div class="interests-container">
          <div class="interest-item">
            <input type="checkbox" id="heritage" value="heritage">
            <label for="heritage">Heritage Sites</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="temples" value="temples">
            <label for="temples">Temples</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="beaches" value="beaches">
            <label for="beaches">Beaches</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="mountains" value="mountains">
            <label for="mountains">Mountains</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="wildlife" value="wildlife">
            <label for="wildlife">Wildlife</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="food" value="food">
            <label for="food">Indian Cuisine</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="yoga" value="yoga">
            <label for="yoga">Yoga & Wellness</label>
          </div>
          <div class="interest-item">
            <input type="checkbox" id="festivals" value="festivals">
            <label for="festivals">Festivals</label>
          </div>
        </div>
      </div>

      <div class="budget-container">
        <label for="budget">Budget (INR)</label>
        <input type="range" id="budget" class="budget-slider" min="5000" max="100000" value="25000" step="1000">
        <div class="budget-display">
          <span>₹5,000</span>
          <span id="budgetValue">₹25,000</span>
          <span>₹1,00,000</span>
        </div>
      </div>

      <button type="submit" class="generate-btn">
        <i class="fas fa-magic"></i>
        Generate Travel Plan
      </button>
    </form>
  </div>

  
</body>
</html>
